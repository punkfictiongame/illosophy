<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>illosophy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#06080f; --ink:#0a0e19; --haze:#121a2c;
    --bone:#c9d2e0; --dim:#5a6478; --faint:#2b3345;
    --cyan:#35e0e6; --magenta:#ff2d8e;
    --disp:'Chakra Petch', system-ui, sans-serif;
    --mono:'IBM Plex Mono', ui-monospace, monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:var(--void); color:var(--bone);
    font-family:var(--mono); overflow:hidden;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    cursor:default;
  }
  .scene{position:fixed; inset:0; display:none}
  .scene.on{display:block}

  /* ---------- shared atmosphere overlays ---------- */
  .grain, .scan{position:fixed; inset:0; pointer-events:none; z-index:90}
  .scan{
    background:repeating-linear-gradient(0deg,
      rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px,
      rgba(0,0,0,.22) 3px, rgba(0,0,0,0) 4px);
    mix-blend-mode:multiply; opacity:.55;
  }
  .vig{position:fixed; inset:0; pointer-events:none; z-index:91;
    background:radial-gradient(ellipse at center, rgba(0,0,0,0) 42%, rgba(0,0,0,.72) 100%)}

  /* ---------- gate ---------- */
  #gate{align-items:center; justify-content:center; text-align:center; z-index:10}
  #gate.on{display:flex}
  .gate-inner{position:relative; padding:0 24px}
  .eyebrow{font-size:11px; letter-spacing:.62em; color:var(--dim);
    text-transform:uppercase; margin-bottom:34px}
  .mark{position:relative; font-family:var(--disp); font-weight:700;
    font-size:clamp(58px,13vw,150px); line-height:.9; letter-spacing:-.02em;
    color:var(--bone); user-select:none}
  .mark::before,.mark::after{content:attr(data-text); position:absolute; inset:0; opacity:.9}
  .mark::before{color:var(--magenta); mix-blend-mode:screen; animation:sx1 3.2s steps(1) infinite}
  .mark::after{color:var(--cyan); mix-blend-mode:screen; animation:sx2 3.2s steps(1) infinite}
  @keyframes sx1{0%,92%,100%{transform:translate(0,0)}93%{transform:translate(-3px,1px)}96%{transform:translate(2px,-1px)}}
  @keyframes sx2{0%,92%,100%{transform:translate(0,0)}93%{transform:translate(3px,-1px)}96%{transform:translate(-2px,1px)}}
  .tagline{margin-top:30px; font-size:12.5px; letter-spacing:.26em; color:var(--dim);
    text-transform:uppercase; line-height:2}
  .enter{margin-top:56px; font-family:var(--mono); font-size:12px; letter-spacing:.42em;
    color:var(--cyan); text-transform:uppercase; cursor:pointer; user-select:none;
    padding:14px 26px; border:1px solid var(--faint); display:inline-block;
    transition:border-color .35s, color .35s, letter-spacing .35s}
  .enter:hover{border-color:var(--cyan); letter-spacing:.5em; color:#eafeff}
  .enter .cur{animation:blink 1.1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}

  /* ---------- hub ---------- */
  #hub{z-index:10}
  .hub-top{position:absolute; top:26px; left:30px; right:30px;
    display:flex; justify-content:space-between; align-items:baseline;
    font-size:11px; letter-spacing:.3em; color:var(--dim); text-transform:uppercase}
  .hub-top b{font-family:var(--disp); font-weight:600; color:var(--bone); letter-spacing:.05em}
  .hub-status .live{color:var(--cyan)}
  .index{position:absolute; top:50%; left:0; right:0; transform:translateY(-50%);
    padding:0 clamp(24px,7vw,110px)}
  .row{display:grid; grid-template-columns:auto 1fr auto; align-items:center; gap:clamp(18px,4vw,52px);
    padding:26px 0; border-top:1px solid var(--faint); position:relative}
  .row:last-child{border-bottom:1px solid var(--faint)}
  .num{font-family:var(--disp); font-weight:500; font-size:clamp(20px,3vw,30px); color:var(--dim);
    letter-spacing:.02em}
  .rtitle{font-family:var(--disp); font-weight:600; font-size:clamp(26px,6vw,62px);
    line-height:.98; letter-spacing:-.01em; color:var(--bone)}
  .rthinker{display:block; font-family:var(--mono); font-weight:300; font-size:12px;
    letter-spacing:.28em; color:var(--dim); text-transform:uppercase; margin-top:12px}
  .rstate{font-family:var(--mono); font-size:11px; letter-spacing:.34em; text-transform:uppercase;
    color:var(--dim); white-space:nowrap}
  .row.active{cursor:pointer; transition:background .4s}
  .row.active .rstate{color:var(--cyan)}
  .row.active::after{content:''; position:absolute; left:0; top:-1px; bottom:-1px; width:0;
    background:linear-gradient(90deg, rgba(53,224,230,.10), rgba(53,224,230,0));
    transition:width .45s ease; pointer-events:none}
  .row.active:hover::after{width:100%}
  .row.active:hover .rtitle{color:#eafeff}
  .row.active:hover .num{color:var(--cyan)}
  .row.soon{opacity:.4}
  .row.soon .rtitle{color:var(--dim)}

  /* ---------- world stage ---------- */
  #stage{z-index:5; background:var(--void)}
  #glass{position:absolute; inset:0; width:100%; height:100%; display:block;
    touch-action:none; cursor:crosshair}
  .w-back{position:absolute; top:24px; left:28px; z-index:20; font-size:11px; letter-spacing:.34em;
    text-transform:uppercase; color:var(--dim); cursor:pointer; user-select:none;
    transition:color .3s; mix-blend-mode:difference}
  .w-back:hover{color:var(--cyan)}
  .w-phase{position:absolute; top:24px; right:28px; z-index:20; font-size:11px; letter-spacing:.34em;
    text-transform:uppercase; color:var(--dim); user-select:none; text-align:right; mix-blend-mode:difference}
  .w-phase .tick{color:var(--faint); margin-left:8px}
  .w-phase .tick.on{color:var(--cyan)}
  .w-cap{position:absolute; left:0; right:0; bottom:12%; z-index:20; text-align:center;
    padding:0 24px; pointer-events:none}
  .w-cap .line{font-family:var(--mono); font-weight:300; font-size:clamp(15px,2.4vw,22px);
    letter-spacing:.14em; color:var(--bone); opacity:0; transition:opacity 1.1s;
    text-shadow:0 0 22px rgba(0,0,0,.9)}
  .w-cap .line.show{opacity:.92}
  .w-cap .line.terminal{color:var(--magenta); letter-spacing:.2em}
  .w-hint{position:absolute; left:0; right:0; bottom:5%; z-index:20; text-align:center;
    font-size:10.5px; letter-spacing:.32em; text-transform:uppercase; color:var(--dim);
    pointer-events:none; opacity:0; transition:opacity 1.4s}
  .w-hint.show{opacity:.55}
  .w-end{position:absolute; inset:0; z-index:25; display:none; align-items:center; justify-content:center;
    flex-direction:column; gap:30px; background:rgba(3,4,9,.6); backdrop-filter:blur(2px)}
  .w-end.on{display:flex}
  .w-end .opt{font-size:12px; letter-spacing:.4em; text-transform:uppercase; color:var(--dim);
    cursor:pointer; transition:color .3s}
  .w-end .opt:hover{color:var(--cyan)}

  @media (max-width:640px){
    .w-cap{bottom:16%}
    .rthinker{margin-top:8px}
  }
</style>
</head>
<body>

<!-- GATE -->
<section id="gate" class="scene on">
  <div class="gate-inner">
    <div class="eyebrow">an audio-visual reading of postmodern theory</div>
    <div class="mark" data-text="illosophy">illosophy</div>
    <div class="tagline">philosophy · illusion · the signal that replaces the real</div>
    <div class="enter" id="enterBtn">enter the transmission&nbsp;<span class="cur">▸</span></div>
  </div>
</section>

<!-- HUB -->
<section id="hub" class="scene">
  <div class="hub-top">
    <span><b>illosophy</b>&nbsp;&nbsp;// index</span>
    <span class="hub-status">signal <span class="live">◉ live</span></span>
  </div>
  <div class="index" id="indexList"></div>
</section>

<!-- WORLD STAGE -->
<section id="stage" class="scene">
  <canvas id="glass"></canvas>
  <div class="w-back" id="worldBack">◂ index</div>
  <div class="w-phase" id="worldPhase"></div>
  <div class="w-cap"><div class="line" id="capLine"></div></div>
  <div class="w-hint" id="worldHint">move to reach · hold to proliferate</div>
  <div class="w-end" id="worldEnd">
    <div class="opt" id="replayBtn">↻ run again</div>
    <div class="opt" id="returnBtn">◂ return to index</div>
  </div>
</section>

<div class="scan"></div>
<div class="vig"></div>

/* ============================================================
   SHELL  —  gate / hub / world state, shared audio graph
   ============================================================ */
const Shell = (() => {
  const scenes = { gate:byId("gate"), hub:byId("hub"), stage:byId("stage") };
  let audioCtx = null, analyser = null, freq = null;
  let world = null;

  function show(name){
    for (const k in scenes) scenes[k].classList.toggle("on", k===name);
  }

  function ensureAudio(){
    if (audioCtx) return;
    try{
      audioCtx = new (window.AudioContext||window.webkitAudioContext)();
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 256;
      analyser.smoothingTimeConstant = 0.82;
      freq = new Uint8Array(analyser.frequencyBinCount);
    }catch(e){ audioCtx = null; }
  }

  // 0..1 loudness. Falls back to a synthetic pulse when no audio is playing.
  function energy(t){
    if (analyser){
      analyser.getByteFrequencyData(freq);
      let s=0; for (let i=0;i<freq.length;i++) s+=freq[i];
      const avg = s/freq.length/255;
      if (avg > 0.001) return avg;
    }
    // synthetic ambient breath
    return 0.12 + 0.06*Math.sin(t*0.9) + 0.05*Math.sin(t*2.3+1) + (Math.sin(t*0.13)>0.985?0.25:0);
  }

  function openHub(){ ensureAudio(); buildIndex(); show("hub"); }

  function enterWorld(part){
    if (!part || part.status!=="active" || !part.create) return;
    ensureAudio();
    if (audioCtx && audioCtx.state==="suspended") audioCtx.resume();
    world = part.create();
    show("stage");
    world.enter(byId("stage"), part, { audioCtx, analyser, energy });
  }

  function leaveWorld(){
    if (world){ world.exit(); world.cleanup(); world=null; }
    openHub();
  }

  function buildIndex(){
    const host = byId("indexList");
    host.innerHTML = "";
    PARTS.forEach(p=>{
      const active = p.status==="active";
      const row = document.createElement("div");
      row.className = "row " + (active ? "active" : "soon");
      row.innerHTML =
        `<div class="num">${p.numeral}</div>`+
        `<div><div class="rtitle">${p.title}</div>`+
        `<span class="rthinker">${p.thinker}</span></div>`+
        `<div class="rstate">${active ? "enter ▸" : "// forthcoming"}</div>`;
      if (active) row.addEventListener("click", ()=>enterWorld(p));
      host.appendChild(row);
    });
  }

  return { openHub, enterWorld, leaveWorld };
})();

/* ============================================================
   IMAGE PREP  —  precompute cyan / magenta channel layers so the
   RGB-split reads in the project's palette (the signature motif).
   ============================================================ */
function loadGlitchImage(src){
  const out = { ready:false, base:null, cyan:null, magenta:null, w:0, h:0 };
  const img = new Image();
  img.onload = ()=>{
    const w=img.naturalWidth, h=img.naturalHeight;
    out.w=w; out.h=h;
    out.base = draw(img,w,h);
    out.cyan = tint(img,w,h,"#00ffff");
    out.magenta = tint(img,w,h,"#ff00ff");
    out.ready = true;
  };
  img.src = src;
  function draw(im,w,h){ const c=cv(w,h); c.g.drawImage(im,0,0); return c.c; }
  function tint(im,w,h,col){
    const c=cv(w,h);
    c.g.drawImage(im,0,0);
    c.g.globalCompositeOperation="multiply";
    c.g.fillStyle=col; c.g.fillRect(0,0,w,h);
    c.g.globalCompositeOperation="destination-in";
    c.g.drawImage(im,0,0);
    return c.c;
  }
  function cv(w,h){ const c=document.createElement("canvas"); c.width=w; c.height=h;
    return { c, g:c.getContext("2d") }; }
  return out;
}

/* ============================================================
   SIMULACRUM WORLD  —  proliferating copies + live degradation,
   driven through Baudrillard's four phases.
   ============================================================ */
function createSimulacrumWorld(){
  let cvs, ctx, W, H, DPR;
  let host, part, audio;
  let raf=0, running=false, t0=0, paused=false, pausedAt=0, pauseAcc=0;
  let imgs=[], copies=[], counter=0;
  let pointer={x:.5,y:.5,down:false,active:false}, lastSpawn=0;
  let ended=false;
  const MAX_COPIES = RM ? 22 : 66;
  let audioEl=null, srcNode=null;

  const capEl = byId("capLine");
  const phaseEl = byId("worldPhase");
  const hintEl = byId("worldHint");
  const endEl = byId("worldEnd");

  // timed subtitle script drives captions + image swaps; times are absolute seconds.
  // assigned in enter(), once `part` exists — reading it at creation ran too early.
  let SCRIPT = null, collapseAt = 0, trackDur = 0;
  const blackAt = () => (trackDur > collapseAt+2) ? trackDur : collapseAt + 8;
  function cueAt(e){
    let idx=-1;
    for (let i=0;i<SCRIPT.length;i++){ if (e>=SCRIPT[i].t) idx=i; else break; }
    return idx;
  }
  const imgAt = e => { const i=cueAt(e); return i<0 ? 0 : SCRIPT[i].img; };

  function enter(_host, _part, _audio){
    host=_host; part=_part; audio=_audio;
    SCRIPT = part.script;
    collapseAt = SCRIPT[SCRIPT.length-1].t;
    cvs=byId("glass"); ctx=cvs.getContext("2d");
    imgs = part.images.map(src=>loadGlitchImage(src));
    resize(); window.addEventListener("resize", resize);
    bindPointer();
    buildPhaseTicks();
    endEl.classList.remove("on"); ended=false; counter=0; copies=[];
    setupAudio();
    setTimeout(()=>hintEl.classList.add("show"), 800);
    setTimeout(()=>hintEl.classList.remove("show"), 7000);
    running=true; paused=false; pauseAcc=0; t0=performance.now();
    loop();
  }

  function setupAudio(){
    const url = part.audioUrl || CONFIG.audioUrl;
    if (!url || !audio.audioCtx) return;
    audioEl = new Audio();
    audioEl.crossOrigin = "anonymous";
    audioEl.src = url; audioEl.loop = false;
    audioEl.addEventListener("loadedmetadata", ()=>{
      const d = audioEl.duration;
      if (isFinite(d) && d>1) trackDur = d;
    });
    try{
      srcNode = audio.audioCtx.createMediaElementSource(audioEl);
      srcNode.connect(audio.analyser);
      audio.analyser.connect(audio.audioCtx.destination);
    }catch(e){}
    audioEl.play().catch(()=>{});
  }

  /* ---- timeline: audio time if present, else internal clock ---- */
  function elapsed(){
    if (audioEl && !audioEl.paused && audioEl.currentTime>0) return audioEl.currentTime;
    if (paused) return (pausedAt - t0 - pauseAcc)/1000;
    return (performance.now() - t0 - pauseAcc)/1000;
  }
  let shownCue=-2;
  function updateCaption(ci){
    if (ci===shownCue) return;
    shownCue=ci;
    capEl.classList.remove("show");
    setTimeout(()=>{
      if (ci<0){ capEl.textContent=""; capEl.classList.remove("terminal"); return; }
      const cue=SCRIPT[ci];
      capEl.textContent=cue.text;
      capEl.classList.toggle("terminal", !!cue.terminal);
      capEl.classList.add("show");
    }, 220);
    const img = ci<0 ? 0 : SCRIPT[ci].img;
    [...phaseEl.querySelectorAll(".tick")].forEach((el,i)=>el.classList.toggle("on", i<=img));
  }

  /* ---------------- main loop ---------------- */
  function loop(){
    if (!running) return;
    raf=requestAnimationFrame(loop);
    const e = elapsed();
    const now = performance.now()/1000;
    const en = audio.energy(now);

    const ci = cueAt(e);
    updateCaption(ci);
    const img = ci<0 ? 0 : SCRIPT[ci].img;
    const inTerminal = ci>=0 && !!SCRIPT[ci].terminal;

    // global corruption builds from start toward the collapse
    const decay = ease(clamp(e/collapseAt, 0, 1));
    const bA = blackAt();
    const local4 = inTerminal ? clamp((e-collapseAt)/(bA-collapseAt), 0, 1) : 0;

    // ---- phosphor trail ----
    ctx.globalCompositeOperation="source-over";
    ctx.fillStyle="rgba(6,8,15,"+(0.30 - 0.14*decay)+")";
    ctx.fillRect(0,0,W,H);

    const cx=W*0.5, cy=H*0.5;
    const size=Math.min(W,H)*0.44;

    // pointer proximity to the "original"
    const px=pointer.x*W, py=pointer.y*H;
    const dist=Math.hypot(px-cx,py-cy)/(Math.min(W,H)*0.5);
    const reach=clamp(1-dist,0,1);               // 1 when cursor is at the center

    // ---- central original: never restful; recedes as you reach ----
    const breath = 1 + 0.012*Math.sin(now*1.4) + en*0.05;
    const jitter = (0.15 + reach*0.9 + local4*1.2) * (RM?0.4:1);
    const cImg = imgs[img];
    const cInt = clamp(0.12 + decay*0.5 + reach*0.55 + local4, 0, 1.4);
    drawGlitched(cImg, cx, cy, size*breath*(1 - reach*0.06), cInt, jitter, en);

    // reaching too close scatters the center into escaping copies
    if (reach>0.6 && !ended && frameGate(2)){
      spawn(cx+rand(-30,30), cy+rand(-30,30), img, 0.6+reach*0.5, true);
    }

    // ---- proliferating copies ----
    for (let k=copies.length-1;k>=0;k--){
      const c=copies[k];
      c.life-=1;
      if (c.life<=0){ copies.splice(k,1); continue; }
      c.x+=c.vx; c.y+=c.vy; c.vx*=0.985; c.vy*=0.985;
      c.rot+=c.vr;
      const lifeR=c.life/c.maxLife;
      const a=lifeR*(0.85-c.gen*0.06);
      ctx.save();
      ctx.globalAlpha=clamp(a,0,1);
      ctx.translate(c.x,c.y); ctx.rotate(c.rot);
      drawGlitched(imgs[c.pi], 0, 0, c.size, clamp(0.3+c.gen*0.14+decay*0.5,0,1.5), c.gen*0.6+0.3, en, true);
      ctx.restore();
    }

    // ---- terminal collapse: the desert of the real ----
    if (inTerminal){
      staticField(local4, en);
      if (e>=bA && !ended) finish();
    }

    grain(0.05+decay*0.10+local4*0.4);
    scanBias(decay);
  }

  /* draw an image with cyan/magenta channel-split, slice-mosh and blocks */
  function drawGlitched(gi, x, y, size, intensity, jitter, en, centered){
    if (!gi || !gi.ready) return;
    const w=size, h=size*(gi.h/gi.w);
    const bx = centered ? -w/2 : x-w/2, by = y-h/2;

    const off = (1.4 + intensity*7 + en*4) * (RM?0.4:1);
    // base (dimmed as it corrupts)
    ctx.globalCompositeOperation="source-over";
    ctx.globalAlpha *= (1 - 0.35*clamp(intensity,0,1));
    ctx.drawImage(gi.base, bx, by, w, h);
    ctx.globalAlpha /= (1 - 0.35*clamp(intensity,0,1));

    // channel split -> cyan left, magenta right
    ctx.globalCompositeOperation="lighter";
    const jx=(Math.random()-.5)*jitter*3;
    ctx.drawImage(gi.cyan,    bx-off+jx, by, w, h);
    ctx.drawImage(gi.magenta, bx+off-jx, by, w, h);
    ctx.globalCompositeOperation="source-over";

    // horizontal slice-mosh
    const slices = Math.floor(intensity*6*(RM?0.4:1));
    for (let s=0;s<slices;s++){
      const sh=rand(4,26), sy=by+Math.random()*(h-sh);
      const shift=(Math.random()-.5)*intensity*40;
      ctx.drawImage(gi.base, 0, (sy-by)*(gi.h/h), gi.w, sh*(gi.h/h),
                    bx+shift, sy, w, sh);
    }
    // hard blocks at high intensity
    if (intensity>0.8){
      const blocks=Math.floor((intensity-0.8)*14);
      for (let b=0;b<blocks;b++){
        const bw=rand(10,60), bh=rand(6,30);
        const sxp=Math.random()*(w-bw), syp=Math.random()*(h-bh);
        ctx.globalCompositeOperation="lighter";
        ctx.drawImage(Math.random()<.5?gi.cyan:gi.magenta,
          sxp*(gi.w/w), syp*(gi.h/h), bw*(gi.w/w), bh*(gi.h/h),
          bx+sxp+(Math.random()-.5)*30, by+syp, bw, bh);
        ctx.globalCompositeOperation="source-over";
      }
    }
  }

  function spawn(x,y,pi,scaleBias,escaping){
    if (copies.length>=MAX_COPIES) copies.shift();
    counter++;
    const gen = counter % 9;
    const ang = Math.random()*Math.PI*2;
    const sp = escaping ? rand(1.2,3.4) : rand(0.2,1.1);
    copies.push({
      x, y,
      vx:Math.cos(ang)*sp, vy:Math.sin(ang)*sp,
      rot:(Math.random()-.5)*0.1, vr:(Math.random()-.5)*0.01,
      size:Math.min(W,H)*0.44*(0.5+Math.random()*0.5)*scaleBias,
      pi, gen,
      maxLife: RM?55:rand(70,150), life:0
    });
    copies[copies.length-1].life = copies[copies.length-1].maxLife;
  }

  /* full-screen dissolving static for the terminal beat */
  function staticField(amt, en){
    if (amt<=0) return;
    const density=Math.floor(amt*amt*(RM?120:520));
    ctx.globalCompositeOperation="lighter";
    for (let i=0;i<density;i++){
      const gx=Math.random()*W, gy=Math.random()*H;
      ctx.fillStyle = Math.random()<.5 ? "rgba(53,224,230,"+(0.05+en*0.1)+")"
                                       : "rgba(255,45,142,"+(0.05+en*0.1)+")";
      ctx.fillRect(gx,gy,rand(1,3),rand(1,3));
    }
    ctx.globalCompositeOperation="source-over";
    // creeping black — the real evacuates the frame
    ctx.fillStyle="rgba(3,4,9,"+(amt*0.03)+")";
    ctx.fillRect(0,0,W,H);
  }

  function finish(){
    ended=true;
    // cold mechanical click -> hard cut to black; desert line stays over the void
    ctx.fillStyle="#03040a"; ctx.fillRect(0,0,W,H);
    capEl.classList.add("show","terminal");
    setTimeout(()=>{ endEl.classList.add("on"); }, 1600);
  }

  /* ---------------- input / lifecycle ---------------- */
  let fc=0; function frameGate(n){ return (fc++ % n)===0; }
  function bindPointer(){
    cvs.addEventListener("pointermove", onMove);
    cvs.addEventListener("pointerdown", onDown);
    window.addEventListener("pointerup", onUp);
    window.addEventListener("keydown", onKey);
  }
  function unbindPointer(){
    cvs.removeEventListener("pointermove", onMove);
    cvs.removeEventListener("pointerdown", onDown);
    window.removeEventListener("pointerup", onUp);
    window.removeEventListener("keydown", onKey);
  }
  function onMove(ev){
    const r=cvs.getBoundingClientRect();
    pointer.x=(ev.clientX-r.left)/r.width;
    pointer.y=(ev.clientY-r.top)/r.height;
    pointer.active=true;
    if (ended) return;
    const now=performance.now();
    const gap = pointer.down ? 28 : 85;
    if (now-lastSpawn>gap){
      lastSpawn=now;
      spawn(pointer.x*W, pointer.y*H, imgAt(elapsed()), pointer.down?1:0.7, false);
    }
  }
  function onDown(ev){ pointer.down=true; onMove(ev); }
  function onUp(){ pointer.down=false; }
  function onKey(ev){
    if (ev.key===" "){ togglePause(); ev.preventDefault(); }
  }
  function togglePause(){
    paused=!paused;
    if (paused){ pausedAt=performance.now(); if(audioEl) audioEl.pause(); }
    else { pauseAcc+=performance.now()-pausedAt; if(audioEl) audioEl.play().catch(()=>{}); }
  }

  function buildPhaseTicks(){
    phaseEl.innerHTML = "simulacrum" +
      part.images.map((_,i)=>`<span class="tick" data-i="${i}">▮</span>`).join("");
  }

  function resize(){
    DPR=Math.min(window.devicePixelRatio||1, 2);
    W=window.innerWidth; H=window.innerHeight;
    cvs.width=W*DPR; cvs.height=H*DPR;
    cvs.style.width=W+"px"; cvs.style.height=H+"px";
    ctx.setTransform(DPR,0,0,DPR,0,0);
    ctx.fillStyle="#06080f"; ctx.fillRect(0,0,W,H);
  }

  function grain(a){
    if (a<=0) return;
    const n=Math.floor(a*(RM?60:220));
    ctx.globalCompositeOperation="overlay";
    for (let i=0;i<n;i++){
      const g=Math.random()*255|0;
      ctx.fillStyle="rgba("+g+","+g+","+g+",0.5)";
      ctx.fillRect(Math.random()*W, Math.random()*H, 1.4, 1.4);
    }
    ctx.globalCompositeOperation="source-over";
  }
  function scanBias(d){
    ctx.fillStyle="rgba(53,224,230,"+(0.010+d*0.012)+")";
    ctx.fillRect(0,0,W,H);
  }

  function exit(){
    running=false;
    if (audioEl){ try{audioEl.pause();}catch(e){} }
  }
  function cleanup(){
    cancelAnimationFrame(raf);
    unbindPointer();
    window.removeEventListener("resize", resize);
    if (srcNode){ try{srcNode.disconnect();}catch(e){} }
    if (audio && audio.analyser){ try{audio.analyser.disconnect();}catch(e){} }
    copies=[]; imgs=[];
    capEl.classList.remove("show","terminal"); capEl.textContent="";
    endEl.classList.remove("on");
    ctx && ctx.clearRect(0,0,W,H);
  }

  return { enter, exit, cleanup };
}

/* ============================================================ helpers */
function byId(id){ return document.getElementById(id); }
function clamp(v,a,b){ return v<a?a:v>b?b:v; }
function rand(a,b){ return a+Math.random()*(b-a); }
function ease(t){ return t<.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2; }

/* ---- boot ---- */
byId("enterBtn").addEventListener("click", ()=>Shell.openHub());
byId("worldBack").addEventListener("click", ()=>Shell.leaveWorld());
byId("returnBtn").addEventListener("click", ()=>Shell.leaveWorld());
byId("replayBtn").addEventListener("click", ()=>{
  const p=PARTS.find(x=>x.status==="active");
  Shell.leaveWorld(); setTimeout(()=>Shell.enterWorld(p), 60);
});
</script>
